name: Publish to PyPI

on:
  workflow_dispatch:

permissions:
  id-token: write  # required for PyPI trusted publishing
  contents: write  # required to push git tags

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@447e6d02b15d65b3247cce2d6019f11957285d11 # v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Create and push git tag
        run: |
          VERSION=$(uv version --short)
          TAG="v${VERSION}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists – skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
